name: python_learning_app
description: A modern Android educational app for learning Python.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=2.17.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.0.0
  go_router: ^6.0.0
  json_annotation: ^4.0.0
  flutter_markdown: ^0.6.0
  confetti: ^0.6.0
  highlight: ^0.7.0
  freezed_annotation: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.0.0
  json_serializable: ^6.0.0
  freezed: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/content/